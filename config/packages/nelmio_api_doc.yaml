nelmio_api_doc:
    documentation:
        info:
            title: SMRP Backend API
            description: SMRP Backend API description.
            version: 1.0.0
        components:
            securitySchemes:
                Bearer:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
            security:
                - Bearer: []

    areas: # to filter documented areas
        path_patterns:
            - ^/smrp/api(?!/doc$) # Accepts routes under /api except /api/doc
            - ^/smrp/o/token
