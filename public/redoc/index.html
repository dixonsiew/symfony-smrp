<!doctype html> <!-- Important: must specify -->
<html>
<head>
  <title>ReDoc -MyApi Backend API</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/gh/highlightjs/cdn-release@9.18.1/build/styles/default.min.css">
  <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700|Roboto:300,400,700" rel="stylesheet">
  <script src="//cdn.jsdelivr.net/gh/highlightjs/cdn-release@9.18.1/build/highlight.min.js"></script>
  <script type="module" src="https://unpkg.com/rapidoc/dist/rapidoc-min.js"></script>
</head>
<body>
  <rapi-doc
    render-style="read"
    spec-url="http://localhost:8000/api/doc.json"
    theme = "dark"
    primary-color = "#f54c47"
    bg-color = "#2e3746"
    text-color = "#bacdee"
    show-header = "false"
  > </rapi-doc>
</body>
</html>
